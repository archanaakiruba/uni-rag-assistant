<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABC Uni Study Advisor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #1a1a1a;
    }

    header {
      background: #1c3f6e;
      color: #fff;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }

    header span {
      font-weight: 300;
      opacity: 0.75;
      font-size: 0.85rem;
      margin-left: 10px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 12px;
      line-height: 1.55;
      font-size: 0.92rem;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1c3f6e;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e3e8;
      border-bottom-left-radius: 3px;
    }

    .msg.assistant .answer-text {
      white-space: pre-wrap;
    }

    .msg.assistant .sources {
      margin-top: 8px;
      font-size: 0.78rem;
      color: #8a8fa3;
    }

    .msg.assistant .sources strong {
      font-weight: 600;
      color: #6b7280;
    }

    .msg.loading {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e3e8;
      color: #9ca3af;
      font-style: italic;
      font-size: 0.88rem;
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: #fff;
      border-top: 1px solid #e0e3e8;
      flex-shrink: 0;
    }

    #question {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.92rem;
      outline: none;
      resize: none;
      height: 42px;
      line-height: 1.4;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    #question:focus {
      border-color: #1c3f6e;
    }

    #send {
      padding: 0 20px;
      background: #1c3f6e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #send:hover { background: #15315a; }
    #send:disabled { background: #93a3b8; cursor: not-allowed; }

    .empty-state {
      text-align: center;
      color: #9ca3af;
      margin: auto;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .empty-state p:first-child {
      font-size: 1.05rem;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<header>
  ABC Uni Study Advisor
</header>

<div id="chat">
  <div class="empty-state" id="empty">
    <p>Ask anything about ABC University</p>
    Admissions &nbsp;·&nbsp; Financing &nbsp;·&nbsp; Programs &nbsp;·&nbsp; Credit transfer &nbsp;·&nbsp; Visa &amp; timelines
  </div>
</div>

<div id="input-area">
  <textarea id="question" placeholder="Type your question and press Enter…" rows="1"></textarea>
  <button id="send">Send</button>
</div>

<script>
  const USER_ID = "demo_user";
  const chat = document.getElementById("chat");
  const input = document.getElementById("question");
  const sendBtn = document.getElementById("send");
  const emptyState = document.getElementById("empty");

  function appendMsg(role, content, sources) {
    if (emptyState) emptyState.remove();

    const div = document.createElement("div");
    div.className = `msg ${role}`;

    if (role === "assistant") {
      const text = document.createElement("div");
      text.className = "answer-text";
      text.textContent = content;
      div.appendChild(text);

      if (sources && sources.length > 0) {
        const src = document.createElement("div");
        src.className = "sources";
        src.innerHTML = `<strong>Sources:</strong> ${sources.join(", ")}`;
        div.appendChild(src);
      }
    } else {
      div.textContent = content;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function appendLoading() {
    const div = document.createElement("div");
    div.className = "msg loading";
    div.id = "loading-indicator";
    div.textContent = "Thinking…";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const question = input.value.trim();
    if (!question) return;

    input.value = "";
    input.style.height = "42px";
    sendBtn.disabled = true;

    appendMsg("user", question);
    const loader = appendLoading();

    try {
      const resp = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: USER_ID, question }),
      });

      loader.remove();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        appendMsg("assistant", `Error ${resp.status}: ${err.detail || resp.statusText}`, []);
      } else {
        const data = await resp.json();
        appendMsg("assistant", data.answer, data.sources);
      }
    } catch (e) {
      loader.remove();
      appendMsg("assistant", `Network error: ${e.message}`, []);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "42px";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  input.focus();
</script>
</body>
</html>
